name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Run full test suite
        run: python -m pytest -q

      - name: Run synthetic smoke analysis
        env:
          MPLBACKEND: Agg
        run: >
          python run_analysis.py
          --synthetic
          --maturity-years 0.5
          --max-ltv 0.9
          --representative-ltv 0.8
          --pool-tvl 1e7
          --band-drop 0.08
          --depeg 0.03
          --discount-widen 0.04
          --horizon-days 2
          --sigma-max 0.02
          --maturity-haircut 0.15
          --rho 0.5
          --chart /tmp/smoke.png
