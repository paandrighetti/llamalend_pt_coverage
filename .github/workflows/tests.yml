name: tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install -r requirements.txt
      - run: python tests/test_coverage_model.py
      - run: MPLBACKEND=Agg python run_analysis.py --synthetic --maturity-years 0.5 --max-ltv 0.9 --representative-ltv 0.8 --pool-tvl 1e7 --band-drop 0.08 --depeg 0.03 --discount-widen 0.04 --horizon-days 2 --sigma-max 0.02 --maturity-haircut 0.15 --rho 0.5 --chart /tmp/smoke.png
